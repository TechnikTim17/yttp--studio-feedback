
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YTTP – Feedback</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --off-white: #F3F2EE;
    --light-gray: #DBDBDB;
    --taupe: #827B6D;
    --anthracite: #1C1C1C;
    --sage: #9CA095;
    --orange: #D7662F;
    --font: 'Inter', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--off-white);
    font-family: var(--font);
    color: var(--anthracite);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- TICKER ---- */
  .ticker-wrap {
    width: 100%;
    background: var(--anthracite);
    overflow: hidden;
    padding: 10px 0;
  }

  .ticker-track {
    display: flex;
    white-space: nowrap;
    animation: ticker 12s linear infinite;
  }

  .ticker-track:hover { animation-play-state: paused; }

  .ticker-item {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--off-white);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .ticker-dot {
    width: 4px;
    height: 4px;
    background: var(--off-white);
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ---- HEADER ---- */
  .header {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo { color: var(--anthracite); }

  .anon-badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--taupe);
    border: 1px solid var(--light-gray);
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .anon-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    background: var(--sage);
    border-radius: 50%;
    display: inline-block;
  }

  /* ---- CONTAINER ---- */
  .container {
    flex: 1;
    padding: 32px 24px 40px;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }

  .studio-label {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 6px;
  }

  .headline {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.25;
    margin-bottom: 32px;
    color: var(--anthracite);
  }

  .divider {
    width: 24px;
    height: 1px;
    background: var(--light-gray);
    margin: 0 0 28px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 12px;
  }

  /* ---- STERNE ---- */
  .stars-row {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }

  .star {
    width: 44px;
    height: 44px;
    cursor: pointer;
    background: none;
    border: 1px solid var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .star svg { width: 20px; height: 20px; }

  .star.active {
    border-color: var(--anthracite);
    background: var(--anthracite);
  }

  .star.active svg path { fill: var(--off-white); }
  .star:not(.active) svg path { fill: none; stroke: var(--light-gray); stroke-width: 1.5; }

  /* ---- LIKERT ---- */
  .question-block { margin-bottom: 28px; }

  .question-text {
    font-size: 13px;
    color: var(--anthracite);
    margin-bottom: 12px;
    line-height: 1.5;
    font-weight: 400;
  }

  .likert-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .likert-btn {
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 12px;
    border: 1px solid var(--light-gray);
    background: transparent;
    color: var(--anthracite);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .likert-btn.selected {
    border-color: var(--anthracite);
    background: var(--anthracite);
    color: var(--off-white);
  }

  /* ---- KOMMENTAR ---- */
  .comment-block { margin-bottom: 32px; }

  textarea {
    width: 100%;
    font-family: var(--font);
    font-size: 13px;
    color: var(--anthracite);
    background: transparent;
    border: 1px solid var(--light-gray);
    padding: 14px;
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--taupe); }
  textarea:focus { border-color: var(--anthracite); }

  /* ---- SUBMIT ---- */
  .submit-btn {
    width: 100%;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 16px;
    background: var(--anthracite);
    color: var(--off-white);
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { background: var(--light-gray); color: var(--taupe); cursor: not-allowed; }

  .error-msg {
    font-size: 11px;
    color: var(--orange);
    margin-top: 8px;
    display: none;
  }

  .error-msg.visible { display: block; }

  /* ---- SUCCESS ---- */
  .success-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }

  .success-screen.visible { display: flex; }

  .success-mark {
    width: 48px;
    height: 48px;
    border: 1px solid var(--anthracite);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .success-title {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }

  .success-sub {
    font-size: 13px;
    color: var(--taupe);
    line-height: 1.6;
  }

  /* ---- LOADING ---- */
  .loading-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--light-gray);
    border-top-color: var(--anthracite);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

        <polygon points="224.81 788.42 224.81 781.33 224.81 519.93 303.99 104.41 323.89 0 272.1 0 204.56 0 168.34 300.45 165.14 300.45 126.79 0 0 0 99.09 519.93 99.09 781.33 99.09 788.42 224.81 788.42"/>

<script>
  // ---- Übersetzungen ----
  // Berlin-Slugs (Präfix "berlin-") bekommen Englisch, alle anderen bleiben Deutsch.
  // Die gespeicherten Antwortwerte (answer_1/2/3) bleiben in beiden Sprachen die
  // deutschen Originalwerte (siehe data-value auf den Likert-Buttons), damit
  // Reporting/Views in Supabase unverändert weiterlaufen. Slugs, URL-Parameter
  // und QR-Codes werden hier nicht angefasst.
  const I18N = {
    de: {
      anon: 'Anonym',
      headline: 'Wie hat dir der Kurs gefallen?',
      rating: 'Bewertung',
      checkinLabel: 'Check-in',
      checkinQuestion: 'Wie reibungslos war dein Check-in heute?',
      checkinOptions: ['Sehr reibungslos', 'Reibungslos', 'Okay', 'Holprig', 'Sehr holprig'],
      cleanLabel: 'Sauberkeit',
      cleanQuestion: 'Wie sauber war das Studio?',
      cleanOptions: ['Sehr sauber', 'Sauber', 'Okay', 'Weniger sauber', 'Nicht sauber'],
      classLabel: 'Kurs',
      classQuestion: 'Wie war die Qualität des Kurses?',
      classOptions: ['Sehr gut', 'Gut', 'Okay', 'Weniger gut', 'Nicht gut'],
      commentLabel: 'Weitere Anmerkungen (optional)',
      commentPlaceholder: 'Was hat dir besonders gut gefallen? Was könnten wir verbessern?',
      submit: 'Feedback senden',
      submitting: 'Wird gesendet...',
      errNoStars: 'Bitte gib eine Sternebewertung ab.',
      errGeneric: 'Etwas ist schiefgelaufen. Bitte versuche es erneut.',
      errNoSlug: 'Kein Studio angegeben. Bitte scanne den QR-Code im Studio.',
      errNoStudio: 'Studio nicht gefunden.',
      errConnection: 'Verbindungsfehler. Bitte versuche es erneut.',
      successTitle: 'Danke für dein Feedback.',
      successSub: 'Es hilft uns, jeden Kurs<br>besser zu machen.',
      webshop: "Hier geht's zum Webshop",
      starAria: n => `${n} Stern${n > 1 ? 'e' : ''}`,
    },
    en: {
      anon: 'Anonymous',
      headline: 'How did you enjoy the class?',
      rating: 'Rating',
      checkinLabel: 'Check-in',
      checkinQuestion: 'How smooth was your check-in today?',
      checkinOptions: ['Very smooth', 'Smooth', 'Okay', 'Bumpy', 'Very bumpy'],
      cleanLabel: 'Cleanliness',
      cleanQuestion: 'How clean was the studio?',
      cleanOptions: ['Very clean', 'Clean', 'Okay', 'Less clean', 'Not clean'],
      classLabel: 'Class',
      classQuestion: 'How was the quality of the class?',
      classOptions: ['Very good', 'Good', 'Okay', 'Less good', 'Not good'],
      commentLabel: 'Additional comments (optional)',
      commentPlaceholder: 'What did you like most? What could we improve?',
      submit: 'Send feedback',
      submitting: 'Sending...',
      errNoStars: 'Please give a star rating.',
      errGeneric: 'Something went wrong. Please try again.',
      errNoSlug: 'No studio specified. Please scan the QR code in the studio.',
      errNoStudio: 'Studio not found.',
      errConnection: 'Connection error. Please try again.',
      successTitle: 'Thank you for your feedback.',
      successSub: 'It helps us make<br>every class better.',
      webshop: 'Go to our webshop',
      starAria: n => `${n} star${n > 1 ? 's' : ''}`,
    },
  };

  let studioData = null;
  let selectedStars = 0;
  let likertAnswers = { checkin: null, sauberkeit: null, kurs: null };
  let T = I18N.de;

  function applyLanguage(lang) {
    T = I18N[lang] || I18N.de;
    document.documentElement.lang = lang;

    document.getElementById('anon-badge').textContent = T.anon;
    document.getElementById('headline').textContent = T.headline;
    document.getElementById('rating-label').textContent = T.rating;

    document.getElementById('checkin-label').textContent = T.checkinLabel;
    document.getElementById('checkin-question').textContent = T.checkinQuestion;
    setLikertLabels('q-checkin', T.checkinOptions);

    document.getElementById('cleanliness-label').textContent = T.cleanLabel;
    document.getElementById('cleanliness-question').textContent = T.cleanQuestion;
    setLikertLabels('q-sauberkeit', T.cleanOptions);

    document.getElementById('class-label').textContent = T.classLabel;
    document.getElementById('class-question').textContent = T.classQuestion;
    setLikertLabels('q-kurs', T.classOptions);

    document.getElementById('comment-label').textContent = T.commentLabel;
    document.getElementById('comment-field').placeholder = T.commentPlaceholder;

    document.getElementById('submit-btn').textContent = T.submit;

    document.getElementById('success-title').textContent = T.successTitle;
    document.getElementById('success-sub').innerHTML = T.successSub;

    document.querySelectorAll('.star').forEach(el => {
      const n = parseInt(el.dataset.val, 10);
      el.setAttribute('aria-label', T.starAria(n));
    });
  }

  // Setzt nur den sichtbaren Text der Likert-Buttons neu.
  // data-value (deutscher Originalwert) bleibt unverändert und wird beim
  // Absenden ans Backend geschickt, unabhängig von der Anzeigesprache.
  function setLikertLabels(rowId, labels) {
    const buttons = document.querySelectorAll(`#${rowId} .likert-btn`);
    buttons.forEach((btn, i) => {
      if (labels[i]) btn.textContent = labels[i];
    });
  }

  // Ticker-Banner ist je Stadt unterschiedlich (nicht je einzelnem Studio):
  // Berlin bewirbt YTTP Strength Ku'damm, Köln bewirbt YTTP Strength Belgisches
  // Viertel. Hamburg (und alles Unbekannte) zeigt aktuell keinen Banner, bis es
  // einen eigenen Inhalt dafür gibt.
  function buildTickerHTML(segments) {
    const dot = '<span class="ticker-dot"></span>';
    const item = segments.join(' ' + dot + ' ') + ' ' + dot + ' ';
    return item.repeat(4).trim();
  }

  function setupTicker(slug) {
    const wrap = document.getElementById('ticker-wrap');
    const track = document.getElementById('ticker-track');
    const lower = (slug || '').toLowerCase();
    let segments = null;

    if (lower.startsWith('berlin-')) {
      segments = ['Opening Soon', "YTTP Strength", "Berlin Ku'damm"];
    } else if (lower.startsWith('koeln-')) {
      segments = ['Opening Soon', 'YTTP Strength', 'Belgisches Viertel', '50674 Köln'];
    }

    if (segments) {
      track.innerHTML = buildTickerHTML(segments);
      wrap.style.display = '';
    } else {
      wrap.style.display = 'none';
    }
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('studio');

    const lang = slug && slug.toLowerCase().startsWith('berlin-') ? 'en' : 'de';
    applyLanguage(lang);
    setupTicker(slug);

    if (!slug) { showError(T.errNoSlug); return; }
    await loadStudio(slug);
  }

  async function loadStudio(slug) {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/studios?slug=eq.${encodeURIComponent(slug)}&select=*`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const studios = await res.json();
      if (!studios.length) { showError(T.errNoStudio); return; }
      studioData = studios[0];
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('form-screen').style.display = 'block';
      document.getElementById('studio-label').textContent = studioData.name;
    } catch (e) {
      showError(T.errConnection);
    }
  }

  function setStar(val) {
    selectedStars = val;
    document.querySelectorAll('.star').forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.val) <= val);
    });
  }

  function selectLikert(key, btn) {
    likertAnswers[key] = btn.dataset.value;
    btn.closest('.likert-row').querySelectorAll('.likert-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  async function submitFeedback() {
    if (!selectedStars) {
      const err = document.getElementById('error-msg');
      err.textContent = T.errNoStars;
      err.classList.add('visible');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = T.submitting;

    const payload = {
      studio_id: studioData.id,
      studio_slug: studioData.slug,
      stars: selectedStars,
      answer_1: likertAnswers.checkin,
      answer_2: likertAnswers.sauberkeit,
      answer_3: likertAnswers.kurs,
      answer_4: null,
      answer_5: null,
      comment: document.getElementById('comment-field').value.trim() || null,
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/feedback`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation',
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('API error');

      // Lehrer-Zuordnung anstoßen (ordnet den Feedback-Eintrag dem zuletzt
      // beendeten Kurs an diesem Studio zu). Läuft serverseitig in einer
      // Supabase Edge Function, bewusst nicht abgewartet: das Gäste-Erlebnis
      // darf nicht von bSport-Erreichbarkeit abhängen.
      try {
        const insertedRows = await res.json();
        const feedbackId = Array.isArray(insertedRows) && insertedRows[0] ? insertedRows[0].id : null;
        if (feedbackId) {
          fetch(`${SUPABASE_URL}/functions/v1/attribute-teacher`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              feedback_id: feedbackId,
              studio_slug: studioData.slug,
              submitted_at: new Date().toISOString(),
            }),
          }).catch(() => {});
        }
      } catch (e) {
        // Zuordnung ist rein intern/optional, darf den Feedback-Flow nie stören.
      }

      // Bei 5 Sternen und hinterlegtem Google-Link: nach dem Speichern
      // direkt zur Google-Bewertungsseite des Studios weiterleiten, statt
      // die eigene Dankes-Seite zu zeigen. Alle anderen Fälle (1-4 Sterne,
      // oder 5 Sterne ohne hinterlegten Link) zeigen die normale Dankes-Seite.
      if (selectedStars === 5 && studioData.google_review_url) {
        window.location.href = studioData.google_review_url;
        return;
      }

      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('success-screen').classList.add('visible');
    } catch (e) {
      btn.disabled = false;
      btn.textContent = T.submit;
      const err = document.getElementById('error-msg');
      err.textContent = T.errGeneric;
      err.classList.add('visible');
    }
  }

  function showError(msg) {
    document.getElementById('loading-screen').innerHTML =
      `<div style="text-align:center;padding:24px;font-size:13px;color:var(--taupe)">${msg}</div>`;
  }

  init();
</script>
</body>
</html>
