<meta charset="UTF-8">
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YTTP – Feedback</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --off-white: #F3F2EE;
    --light-gray: #DBDBDB;
    --taupe: #827B6D;
    --anthracite: #1C1C1C;
    --sage: #9CA095;
    --orange: #D7662F;
    --font: 'Inter', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--off-white);
    font-family: var(--font);
    color: var(--anthracite);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--anthracite);
  }

  .anon-badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--taupe);
    border: 1px solid var(--light-gray);
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .anon-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    background: var(--sage);
    border-radius: 50%;
    display: inline-block;
  }

  .container {
    flex: 1;
    padding: 32px 24px 40px;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }

  .studio-label {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 6px;
  }

  .headline {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.25;
    margin-bottom: 32px;
    color: var(--anthracite);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 12px;
  }

  .stars-row {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }

  .star {
    width: 44px;
    height: 44px;
    cursor: pointer;
    background: none;
    border: 1px solid var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .star svg { width: 20px; height: 20px; }

  .star.active {
    border-color: var(--anthracite);
    background: var(--anthracite);
  }

  .star.active svg path { fill: var(--off-white); }
  .star:not(.active) svg path { fill: none; stroke: var(--light-gray); stroke-width: 1.5; }

  .question-block { margin-bottom: 28px; }

  .question-text {
    font-size: 13px;
    color: var(--anthracite);
    margin-bottom: 14px;
    line-height: 1.5;
    font-weight: 400;
  }

  .likert-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .likert-option {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    padding: 10px 14px;
    border: 1px solid var(--light-gray);
    background: transparent;
    font-family: var(--font);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--anthracite);
    text-align: left;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
  }

  .likert-option .dot {
    width: 14px;
    height: 14px;
    border: 1px solid var(--light-gray);
    border-radius: 50%;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }

  .likert-option.selected {
    border-color: var(--anthracite);
    background: var(--anthracite);
    color: var(--off-white);
  }

  .likert-option.selected .dot {
    border-color: var(--off-white);
    background: var(--off-white);
  }

  .likert-val {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--taupe);
    min-width: 14px;
  }

  .likert-option.selected .likert-val {
    color: var(--light-gray);
  }

  textarea {
    width: 100%;
    font-family: var(--font);
    font-size: 13px;
    color: var(--anthracite);
    background: transparent;
    border: 1px solid var(--light-gray);
    padding: 14px;
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--taupe); }
  textarea:focus { border-color: var(--anthracite); }

  .comment-block { margin-bottom: 32px; }

  .submit-btn {
    width: 100%;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 16px;
    background: var(--anthracite);
    color: var(--off-white);
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { background: var(--light-gray); color: var(--taupe); cursor: not-allowed; }

  .success-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }

  .success-screen.visible { display: flex; }

  .success-mark {
    width: 48px;
    height: 48px;
    border: 1px solid var(--anthracite);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .success-title {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }

  .success-sub {
    font-size: 13px;
    color: var(--taupe);
    line-height: 1.6;
  }

  .error-msg {
    font-size: 11px;
    color: var(--orange);
    margin-top: 8px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .divider {
    width: 24px;
    height: 1px;
    background: var(--light-gray);
    margin: 0 0 28px;
  }

  .loading-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--light-gray);
    border-top-color: var(--anthracite);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<script>
  const SUPABASE_URL = 'https://sjnrqfqjfqpdjhukgiue.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqbnJxZnFqZnFwZGpodWtnaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTE5NjcsImV4cCI6MjA5NDk4Nzk2N30.cR9HqaON5Etue_98684Vb68slCZtOD2FW13qAY4ALd8';
</script>

<div id="feedback-app">
  <div class="header">
    <div class="logo">YTTP</div>
    <div class="anon-badge">Anonym</div>
  </div>

  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
  </div>

  <div id="form-screen" class="container" style="display:none">
    <div class="studio-label" id="studio-label">Studio</div>
    <div class="headline">Wie war dein Kurs?</div>
    <div class="divider"></div>

    <div class="section-label">Bewertung</div>
    <div class="stars-row">
      <button class="star" data-val="1" onclick="setStar(1)" aria-label="1 Stern">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="star" data-val="2" onclick="setStar(2)" aria-label="2 Sterne">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="star" data-val="3" onclick="setStar(3)" aria-label="3 Sterne">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="star" data-val="4" onclick="setStar(4)" aria-label="4 Sterne">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="star" data-val="5" onclick="setStar(5)" aria-label="5 Sterne">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
    </div>

    <div id="questions-container"></div>

    <div class="comment-block">
      <div class="section-label">Weitere Anmerkungen (optional)</div>
      <textarea id="comment-field" placeholder="Was möchtest du uns noch mitteilen?"></textarea>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitFeedback()">Feedback senden</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div id="success-screen" class="success-screen">
    <div class="success-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="1.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-title">Danke für dein Feedback.</div>
    <div class="success-sub">Es hilft uns, jeden Kurs<br>besser zu machen.</div>
  </div>
</div>

<script>
  const QUESTIONS = [
    {
      id: 'checkin',
      label: 'Wie reibungslos war dein Check-in heute?',
      options: ['Sehr reibungslos', 'Reibungslos', 'Okay', 'Schwierig', 'Sehr schwierig']
    },
    {
      id: 'cleanliness',
      label: 'Wie sauber war das Studio?',
      options: ['Sehr sauber', 'Sauber', 'Okay', 'Weniger sauber', 'Nicht sauber']
    },
    {
      id: 'course_quality',
      label: 'Wie war die Qualität des Kurses?',
      options: ['Sehr gut', 'Gut', 'Okay', 'Weniger gut', 'Nicht gut']
    }
  ];

  let studioData = null;
  let selectedStars = 0;
  let answers = {};

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('studio');
    if (!slug) { showError('Kein Studio angegeben. Bitte scanne den QR-Code im Studio.'); return; }
    await loadStudio(slug);
  }

  async function loadStudio(slug) {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/studios?slug=eq.${encodeURIComponent(slug)}&select=*`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const studios = await res.json();
      if (!studios.length) { showError('Studio nicht gefunden.'); return; }
      studioData = studios[0];
      renderForm();
    } catch (e) {
      showError('Verbindungsfehler. Bitte versuche es erneut.');
    }
  }

  function renderForm() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('form-screen').style.display = 'block';
    document.getElementById('studio-label').textContent = studioData.name;

    const container = document.getElementById('questions-container');
    container.innerHTML = '';

    QUESTIONS.forEach((q, i) => {
      const block = document.createElement('div');
      block.className = 'question-block';

      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = `Frage ${i + 1}`;

      const text = document.createElement('div');
      text.className = 'question-text';
      text.textContent = q.label;

      const row = document.createElement('div');
      row.className = 'likert-row';

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'likert-option';
        btn.innerHTML = `<span class="dot"></span><span class="likert-val">${idx + 1}</span><span>${opt}</span>`;
        btn.onclick = () => {
          answers[q.id] = opt;
          row.querySelectorAll('.likert-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        };
        row.appendChild(btn);
      });

      block.appendChild(label);
      block.appendChild(text);
      block.appendChild(row);
      container.appendChild(block);
    });
  }

  function setStar(val) {
    selectedStars = val;
    document.querySelectorAll('.star').forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.val) <= val);
    });
  }

  async function submitFeedback() {
    if (!selectedStars) {
      const err = document.getElementById('error-msg');
      err.textContent = 'Bitte gib eine Sternebewertung ab.';
      err.classList.add('visible');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Wird gesendet...';

    const payload = {
      studio_id: studioData.id,
      studio_slug: studioData.slug,
      stars: selectedStars,
      answer_1: answers['checkin'] || null,
      answer_2: answers['cleanliness'] || null,
      answer_3: answers['course_quality'] || null,
      answer_4: null,
      answer_5: null,
      comment: document.getElementById('comment-field').value.trim() || null,
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/feedback`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('API error');
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('success-screen').classList.add('visible');
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Feedback senden';
      const err = document.getElementById('error-msg');
      err.textContent = 'Etwas ist schiefgelaufen. Bitte versuche es erneut.';
      err.classList.add('visible');
    }
  }

  function showError(msg) {
    document.getElementById('loading-screen').innerHTML =
      `<div style="text-align:center;padding:24px;font-size:13px;color:var(--taupe)">${msg}</div>`;
  }

  init();
</script>
</body>
</html>
