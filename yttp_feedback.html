<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YTTP – Feedback</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --off-white: #F3F2EE;
    --light-gray: #DBDBDB;
    --taupe: #827B6D;
    --anthracite: #1C1C1C;
    --sage: #9CA095;
    --orange: #D7662F;
    --font: 'Inter', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--off-white);
    font-family: var(--font);
    color: var(--anthracite);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--anthracite);
  }

  .anon-badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--taupe);
    border: 1px solid var(--light-gray);
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .anon-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    background: var(--sage);
    border-radius: 50%;
    display: inline-block;
  }

  .container {
    flex: 1;
    padding: 32px 24px 40px;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }

  .studio-label {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 6px;
  }

  .headline {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.25;
    margin-bottom: 32px;
    color: var(--anthracite);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 12px;
  }

  .stars-row {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }

  .star {
    width: 44px;
    height: 44px;
    cursor: pointer;
    background: none;
    border: 1px solid var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .star svg { width: 20px; height: 20px; }

  .star.active {
    border-color: var(--anthracite);
    background: var(--anthracite);
  }

  .star.active svg path { fill: var(--off-white); }
  .star:not(.active) svg path { fill: none; stroke: var(--light-gray); stroke-width: 1.5; }

  .question-block { margin-bottom: 24px; }

  .question-text {
    font-size: 13px;
    color: var(--anthracite);
    margin-bottom: 10px;
    line-height: 1.5;
    font-weight: 400;
  }

  .options-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .option-btn {
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 14px;
    border: 1px solid var(--light-gray);
    background: transparent;
    color: var(--anthracite);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .option-btn.selected {
    border-color: var(--anthracite);
    background: var(--anthracite);
    color: var(--off-white);
  }

  .comment-block { margin-bottom: 32px; }

  textarea {
    width: 100%;
    font-family: var(--font);
    font-size: 13px;
    color: var(--anthracite);
    background: transparent;
    border: 1px solid var(--light-gray);
    padding: 14px;
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--taupe); }
  textarea:focus { border-color: var(--anthracite); }

  .submit-btn {
    width: 100%;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 16px;
    background: var(--anthracite);
    color: var(--off-white);
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { background: var(--light-gray); color: var(--taupe); cursor: not-allowed; }

  .success-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }

  .success-screen.visible { display: flex; }

  .success-mark {
    width: 48px;
    height: 48px;
    border: 1px solid var(--anthracite);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .success-title {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }

  .success-sub {
    font-size: 13px;
    color: var(--taupe);
    line-height: 1.6;
  }

  .error-msg {
    font-size: 11px;
    color: var(--orange);
    margin-top: 8px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .divider {
    width: 24px;
    height: 1px;
    background: var(--light-gray);
    margin: 0 0 28px;
  }

  .loading-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--light-gray);
    border-top-color: var(--anthracite);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .admin-panel {
    display: none;
    background: white;
    padding: 32px 24px;
    max-width: 560px;
    margin: 0 auto;
    font-family: var(--font);
  }

  .admin-panel.visible { display: block; }

  .admin-title {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 24px;
    color: var(--anthracite);
  }

  .qr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 24px;
  }

  .qr-card {
    border: 1px solid var(--light-gray);
    padding: 20px;
    text-align: center;
  }

  .qr-card-name {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 12px;
  }

  .qr-code-box { margin-bottom: 8px; }
  .qr-url { font-size: 9px; color: var(--taupe); word-break: break-all; }
</style>
</head>
<body>

<script>
  const SUPABASE_URL = 'https://sjnrqfqjfqpdjhukgiue.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqbnJxZnFqZnFwZGpodWtnaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTE5NjcsImV4cCI6MjA5NDk4Nzk2N30.cR9HqaON5Etue_98684Vb68slCZtOD2FW13qAY4ALd8';
  const FEEDBACK_BASE_URL = 'https://feedback.yttp.de';
</script>

<div id="feedback-app">
  <div class="header">
    <div class="logo">YTTP</div>
    <div class="anon-badge">Anonym</div>
  </div>

  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
  </div>

  <div id="form-screen" class="container" style="display:none">
    <div class="studio-label" id="studio-label">Studio</div>
    <div class="headline">Wie war dein Kurs?</div>
    <div class="divider"></div>

    <div class="section-label">Bewertung</div>
    <div class="stars-row" id="stars-row">
      <button class="star" data-val="1" onclick="setStar(1)" aria-label="1 Stern">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="star" data-val="2" onclick="setStar(2)" aria-label="2 Sterne">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="star" data-val="3" onclick="setStar(3)" aria-label="3 Sterne">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="star" data-val="4" onclick="setStar(4)" aria-label="4 Sterne">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="star" data-val="5" onclick="setStar(5)" aria-label="5 Sterne">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
    </div>

    <div class="question-block" id="q1-block" style="display:none">
      <div class="section-label">Frage 1</div>
      <div class="question-text" id="q1-text"></div>
      <div class="options-row" id="q1-options"></div>
    </div>

    <div class="question-block" id="q2-block" style="display:none">
      <div class="section-label">Frage 2</div>
      <div class="question-text" id="q2-text"></div>
      <div class="options-row" id="q2-options"></div>
    </div>

    <div class="comment-block">
      <div class="section-label">Kommentar (optional)</div>
      <textarea id="comment-field" placeholder="Was hat dir besonders gut gefallen? Was könnten wir verbessern?"></textarea>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitFeedback()">Feedback senden</button>
    <div class="error-msg" id="error-msg">Etwas ist schiefgelaufen. Bitte versuche es erneut.</div>
  </div>

  <div id="success-screen" class="success-screen">
    <div class="success-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="1.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-title">Danke für dein Feedback.</div>
    <div class="success-sub">Es hilft uns, jeden Kurs<br>besser zu machen.</div>
  </div>
</div>

<div id="admin-panel" class="admin-panel">
  <div class="admin-title">QR-Code Generator — YTTP Studios</div>
  <div id="qr-grid" class="qr-grid"></div>
</div>

<script>
  let studioData = null;
  let questionsData = [];
  let selectedStars = 0;
  let selectedQ1 = null;
  let selectedQ2 = null;

  const ANSWER_OPTIONS = {
    'Wie war die Intensität des Kurses für dich?': ['Zu leicht', 'Genau richtig', 'Sehr fordernd'],
    'Hat dir die Anleitung durch den Coach geholfen?': ['Sehr hilfreich', 'In Ordnung', 'Weniger hilfreich'],
    'Wie war das Tempo des Kurses?': ['Zu langsam', 'Genau richtig', 'Zu schnell'],
    'Würdest du diesen Kurs weiterempfehlen?': ['Ja, auf jeden Fall', 'Wahrscheinlich', 'Eher nicht'],
    'Wie fordernd war das Training?': ['Zu leicht', 'Genau richtig', 'Sehr intensiv'],
    'Hat die Struktur des Kurses für dich gepasst?': ['Ja', 'Teilweise', 'Nein'],
  };

  const DEFAULT_OPTIONS = ['Ja', 'Teilweise', 'Nein'];

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('studio');
    const isAdmin = params.get('admin') === '1';

    if (isAdmin) { showAdminPanel(); return; }
    if (!slug) { showError('Kein Studio angegeben. Bitte scanne den QR-Code im Studio.'); return; }

    await loadStudioAndQuestions(slug);
  }

  async function loadStudioAndQuestions(slug) {
    try {
      const studioRes = await fetch(
        `${SUPABASE_URL}/rest/v1/studios?slug=eq.${encodeURIComponent(slug)}&select=*`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const studios = await studioRes.json();
      if (!studios.length) { showError('Studio nicht gefunden.'); return; }
      studioData = studios[0];

      const questionsRes = await fetch(
        `${SUPABASE_URL}/rest/v1/questions?studio_type=eq.${encodeURIComponent(studioData.type)}&active=eq.true&order=position.asc&select=*`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      questionsData = await questionsRes.json();
      renderForm();
    } catch (e) {
      showError('Verbindungsfehler. Bitte versuche es erneut.');
    }
  }

  function renderForm() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('form-screen').style.display = 'block';
    document.getElementById('studio-label').textContent = studioData.name;

    questionsData.forEach((q, i) => {
      const n = i + 1;
      const block = document.getElementById(`q${n}-block`);
      const textEl = document.getElementById(`q${n}-text`);
      const optionsEl = document.getElementById(`q${n}-options`);
      if (!block) return;
      textEl.textContent = q.label;
      block.style.display = 'block';
      const opts = ANSWER_OPTIONS[q.label] || DEFAULT_OPTIONS;
      opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => selectOption(n, opt, optionsEl);
        optionsEl.appendChild(btn);
      });
    });
  }

  function setStar(val) {
    selectedStars = val;
    document.querySelectorAll('.star').forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.val) <= val);
    });
  }

  function selectOption(questionNum, val, container) {
    if (questionNum === 1) selectedQ1 = val;
    if (questionNum === 2) selectedQ2 = val;
    container.querySelectorAll('.option-btn').forEach(b => {
      b.classList.toggle('selected', b.textContent === val);
    });
  }

  async function submitFeedback() {
    if (!selectedStars) {
      document.getElementById('error-msg').textContent = 'Bitte gib eine Sternebewertung ab.';
      document.getElementById('error-msg').classList.add('visible');
      return;
    }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Wird gesendet...';

    const payload = {
      studio_id: studioData.id,
      studio_slug: studioData.slug,
      stars: selectedStars,
      answer_1: selectedQ1,
      answer_2: selectedQ2,
      comment: document.getElementById('comment-field').value.trim() || null,
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/feedback`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('API error');
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('success-screen').classList.add('visible');
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Feedback senden';
      document.getElementById('error-msg').textContent = 'Etwas ist schiefgelaufen. Bitte versuche es erneut.';
      document.getElementById('error-msg').classList.add('visible');
    }
  }

  function showError(msg) {
    document.getElementById('loading-screen').innerHTML =
      `<div style="text-align:center;padding:24px;font-size:13px;color:var(--taupe)">${msg}</div>`;
  }

  async function showAdminPanel() {
    document.getElementById('feedback-app').style.display = 'none';
    document.getElementById('admin-panel').classList.add('visible');
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/studios?select=*&order=name.asc`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const studios = await res.json();
      const grid = document.getElementById('qr-grid');
      studios.forEach(s => {
        const url = `${FEEDBACK_BASE_URL}?studio=${s.slug}`;
        const card = document.createElement('div');
        card.className = 'qr-card';
        card.innerHTML = `
          <div class="qr-card-name">${s.name}</div>
          <div class="qr-code-box" id="qr-${s.id}"></div>
          <div class="qr-url">${url}</div>
        `;
        grid.appendChild(card);
        setTimeout(() => {
          new QRCode(document.getElementById(`qr-${s.id}`), {
            text: url, width: 128, height: 128,
            colorDark: '#1C1C1C', colorLight: '#F3F2EE',
          });
        }, 100);
      });
    } catch (e) {
      document.getElementById('admin-panel').innerHTML += '<p style="color:var(--orange);font-size:12px">Fehler beim Laden der Studios.</p>';
    }
  }

  init();
</script>
</body>
</html>
